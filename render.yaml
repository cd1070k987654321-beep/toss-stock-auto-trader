services:
  - type: web
    name: toss-stock-auto-trader
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TOSS_TRADING_MODE
        value: test
      - key: TOSS_LIVE_ORDER_ENABLED
        value: false
      - key: TOSS_API_BASE_URL
        value: https://openapi.tossinvest.com
