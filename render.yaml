services:
  - type: web
    name: toss-stock-auto-trader
    env: docker
    plan: starter
    healthCheckPath: /health
    disk:
      name: trading-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 4000
      - key: TOSS_TRADING_MODE
        value: test
      - key: TOSS_LIVE_ORDER_ENABLED
        value: false
      - key: TOSS_API_BASE_URL
        value: https://openapi.tossinvest.com
